<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇 - DeepSeek V4 Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            width: fit-content;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .score-board {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .score-label {
            opacity: 0.7;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        #scoreValue {
            color: #4facfe;
            font-weight: bold;
            font-size: 1.8rem;
            min-width: 40px;
            display: inline-block;
            text-align: center;
        }

        .high-score-board {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .high-score-label {
            opacity: 0.7;
        }

        #highScoreValue {
            color: #ffd54f;
            font-weight: bold;
            font-size: 1.4rem;
            min-width: 30px;
            display: inline-block;
            text-align: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 0 0 2px rgba(255, 255, 255, 0.15);
            background-color: #0f0f1a;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #ffffff;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn:active {
            transform: translateY(0px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn.primary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            color: #121212;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(79, 172, 254, 0.4);
        }

        .btn.primary:hover {
            box-shadow: 0 8px 30px rgba(79, 172, 254, 0.6);
            background: linear-gradient(135deg, #5ebeff, #33f5ff);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(5px);
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        .game-over-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over-text {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
        }

        .final-score {
            font-size: 1.2rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .mobile-controls {
            display: none;
            margin-top: 20px;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 8px;
            justify-content: center;
        }

        .dir-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .dir-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.92);
        }

        .dir-btn.up {
            grid-column: 2;
            grid-row: 1;
        }
        .dir-btn.left {
            grid-column: 1;
            grid-row: 2;
        }
        .dir-btn.right {
            grid-column: 3;
            grid-row: 2;
        }
        .dir-btn.down {
            grid-column: 2;
            grid-row: 3;
        }

        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
            }
            .game-container {
                padding: 15px;
            }
            .header {
                font-size: 1rem;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            canvas {
                width: 100%;
                height: auto;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score-board">
                <span class="score-label">🍎 得分</span>
                <span id="scoreValue">0</span>
            </div>
            <div class="high-score-board">
                <span class="high-score-label">🏆 最高分</span>
                <span id="highScoreValue">0</span>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-text">游戏结束</div>
                <div class="final-score" id="finalScore">得分: 0</div>
                <button class="btn primary" id="restartBtnOverlay">🔄 重新开始</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn primary" id="startBtn">▶️ 开始游戏</button>
            <button class="btn" id="pauseBtn">⏸️ 暂停</button>
            <button class="btn" id="restartBtn">🔄 重新开始</button>
        </div>

        <!-- 移动端方向键 -->
        <div class="mobile-controls" id="mobileControls">
            <button class="dir-btn up" id="btnUp">▲</button>
            <button class="dir-btn left" id="btnLeft">◀</button>
            <button class="dir-btn right" id="btnRight">▶</button>
            <button class="dir-btn down" id="btnDown">▼</button>
        </div>
    </div>

    <script>
        (function() {
            // ===========================
            //  游戏配置
            // ===========================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            const GRID_SIZE = 20;          // 每个格子像素大小
            const COLS = canvas.width / GRID_SIZE;   // 20
            const ROWS = canvas.height / GRID_SIZE;  // 20

            // 初始蛇
            const INIT_SNAKE = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            const INIT_DIRECTION = { x: 1, y: 0 }; // 向右

            // 游戏状态变量
            let snake = [...INIT_SNAKE.map(p => ({...p}))];
            let food = { x: 15, y: 10 };
            let direction = { ...INIT_DIRECTION };
            let nextDirection = { ...INIT_DIRECTION };
            let score = 0;
            let highScore = 0;
            let gameRunning = false;
            let gamePaused = false;
            let gameOver = false;
            let gameLoopId = null;

            // 速度控制 (毫秒/帧)
            const BASE_SPEED = 120; // 初始速度
            let speed = BASE_SPEED;
            let lastUpdateTime = 0;

            // UI 元素
            const scoreSpan = document.getElementById('scoreValue');
            const highScoreSpan = document.getElementById('highScoreValue');
            const gameOverOverlay = document.getElementById('gameOverOverlay');
            const finalScoreSpan = document.getElementById('finalScore');
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const restartBtn = document.getElementById('restartBtn');
            const restartBtnOverlay = document.getElementById('restartBtnOverlay');

            // 移动端按钮
            const btnUp = document.getElementById('btnUp');
            const btnDown = document.getElementById('btnDown');
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');

            // ===========================
            //  本地存储 最高分
            // ===========================
            function loadHighScore() {
                try {
                    const saved = localStorage.getItem('snakeHighScore');
                    return saved ? parseInt(saved, 10) : 0;
                } catch (e) {
                    return 0;
                }
            }

            function saveHighScore(val) {
                try {
                    localStorage.setItem('snakeHighScore', val.toString());
                } catch (e) {
                    // 忽略
                }
            }

            // 初始化最高分
            highScore = loadHighScore();
            highScoreSpan.textContent = highScore;

            // ===========================
            //  工具函数
            // ===========================
            function randomGridPosition() {
                return {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            }

            function isPositionOnSnake(pos, snakeArray) {
                return snakeArray.some(segment => segment.x === pos.x && segment.y === pos.y);
            }

            function generateFood() {
                let newFood = randomGridPosition();
                // 确保食物不在蛇身上
                while (isPositionOnSnake(newFood, snake)) {
                    newFood = randomGridPosition();
                }
                return newFood;
            }

            // 检查是否撞墙
            function isOutOfBounds(pos) {
                return pos.x < 0 || pos.x >= COLS || pos.y < 0 || pos.y >= ROWS;
            }

            // 检查是否撞到自己（除头部外）
            function isSelfCollision(head, snakeBody) {
                return snakeBody.some(segment => segment.x === head.x && segment.y === head.y);
            }

            // ===========================
            //  游戏逻辑
            // ===========================
            function updateGame() {
                if (!gameRunning || gamePaused || gameOver) return;

                // 更新方向（不能反向）
                if (
                    (nextDirection.x !== 0 || nextDirection.y !== 0) && // 防止零向量
                    (nextDirection.x !== -direction.x || nextDirection.y !== -direction.y)
                ) {
                    direction = { ...nextDirection };
                }

                // 计算新头部
                const head = snake[0];
                const newHead = {
                    x: head.x + direction.x,
                    y: head.y + direction.y
                };

                // 检查游戏结束条件
                if (isOutOfBounds(newHead) || isSelfCollision(newHead, snake)) {
                    gameOver = true;
                    gameRunning = false;
                    handleGameOver();
                    return;
                }

                // 添加新头部
                snake.unshift(newHead);

                // 检查是否吃到食物
                if (newHead.x === food.x && newHead.y === food.y) {
                    // 得分
                    score += 10;
                    scoreSpan.textContent = score;
                    // 更新最高分
                    if (score > highScore) {
                        highScore = score;
                        highScoreSpan.textContent = highScore;
                        saveHighScore(highScore);
                    }
                    // 生成新食物
                    food = generateFood();
                    // 可选：增加速度（越吃越快）
                    speed = Math.max(40, BASE_SPEED - Math.floor(score / 50) * 3);
                } else {
                    // 没吃到食物则移除尾部
                    snake.pop();
                }
            }

            function handleGameOver() {
                // 显示覆盖层
                finalScoreSpan.textContent = `得分: ${score}`;
                gameOverOverlay.classList.add('active');
                // 确保按钮显示正常
                restartBtnOverlay.style.display = 'flex';
                // 暂停按钮可以禁用或改变文字，这里不做修改
                draw(); // 重绘一次显示结束状态
            }

            function resetGame() {
                // 重置状态
                snake = INIT_SNAKE.map(p => ({...p}));
                direction = { ...INIT_DIRECTION };
                nextDirection = { ...INIT_DIRECTION };
                score = 0;
                speed = BASE_SPEED;
                food = generateFood();
                gameOver = false;
                gameRunning = false;
                gamePaused = false;
                scoreSpan.textContent = '0';
                gameOverOverlay.classList.remove('active');
                // 清空上次更新时间
                lastUpdateTime = 0;
                draw();
            }

            function startGame() {
                if (gameOver) {
                    resetGame();
                }
                if (!gameRunning) {
                    gameRunning = true;
                    gamePaused = false;
                    gameOver = false;
                    gameOverOverlay.classList.remove('active');
                    lastUpdateTime = performance.now();
                    // 如果已有循环则继续，否则启动
                    if (!gameLoopId) {
                        gameLoop(performance.now());
                    }
                    // 更新按钮状态感
                }
            }

            function pauseGame() {
                if (gameRunning && !gameOver) {
                    gamePaused = !gamePaused;
                    pauseBtn.textContent = gamePaused ? '▶️ 继续' : '⏸️ 暂停';
                    if (!gamePaused) {
                        lastUpdateTime = performance.now(); // 重置时间防止跳帧
                    }
                }
            }

            function restartGame() {
                // 取消当前循环
                if (gameLoopId) {
                    cancelAnimationFrame(gameLoopId);
                    gameLoopId = null;
                }
                resetGame();
                // 自动开始？根据设计可不自动，让玩家点开始
                // 这里我选择重置后自动开始，更流畅
                startGame();
            }

            // ===========================
            //  渲染绘制
            // ===========================
            function draw() {
                // 清空画布
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 绘制网格背景（细线）
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= COLS; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * GRID_SIZE, 0);
                    ctx.lineTo(i * GRID_SIZE, canvas.height);
                    ctx.stroke();
                }
                for (let j = 0; j <= ROWS; j++) {
                    ctx.beginPath();
                    ctx.moveTo(0, j * GRID_SIZE);
                    ctx.lineTo(canvas.width, j * GRID_SIZE);
                    ctx.stroke();
                }

                // 绘制食物
                const fx = food.x * GRID_SIZE;
                const fy = food.y * GRID_SIZE;
                // 食物光晕
                ctx.shadowColor = '#ff4d6d';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#ff4d6d';
                ctx.beginPath();
                ctx.arc(fx + GRID_SIZE / 2, fy + GRID_SIZE / 2, GRID_SIZE / 2 - 2, 0, Math.PI * 2);
                ctx.fill();
                // 食物高光
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffb3c6';
                ctx.beginPath();
                ctx.arc(fx + GRID_SIZE / 2 - 2, fy + GRID_SIZE / 2 - 2, 3, 0, Math.PI * 2);
                ctx.fill();

                // 绘制蛇
                for (let i = 0; i < snake.length; i++) {
                    const seg = snake[i];
                    const sx = seg.x * GRID_SIZE;
                    const sy = seg.y * GRID_SIZE;
                    const padding = 1.5;
                    const radius = 6;

                    // 蛇身渐变颜色
                    const gradient = ctx.createLinearGradient(sx, sy, sx + GRID_SIZE, sy + GRID_SIZE);
                    if (i === 0) {
                        // 头部
                        gradient.addColorStop(0, '#4facfe');
                        gradient.addColorStop(1, '#00f2fe');
                        ctx.shadowColor = '#4facfe';
                        ctx.shadowBlur = 12;
                    } else {
                        // 身体
                        const t = i / snake.length;
                        const r = Math.floor(79 + t * 80);
                        const g = Math.floor(172 - t * 80);
                        const b = Math.floor(254 - t * 50);
                        gradient.addColorStop(0, `rgb(${r}, ${g}, ${b})`);
                        gradient.addColorStop(1, `rgb(${r+20}, ${g-20}, ${b-10})`);
                        ctx.shadowColor = 'rgba(79, 172, 254, 0.5)';
                        ctx.shadowBlur = 6;
                    }

                    ctx.fillStyle = gradient;

                    // 绘制圆角矩形
                    ctx.beginPath();
                    ctx.moveTo(sx + radius + padding, sy + padding);
                    ctx.lineTo(sx + GRID_SIZE - radius - padding, sy + padding);
                    ctx.quadraticCurveTo(sx + GRID_SIZE - padding, sy + padding, sx + GRID_SIZE - padding, sy + radius + padding);
                    ctx.lineTo(sx + GRID_SIZE - padding, sy + GRID_SIZE - radius - padding);
                    ctx.quadraticCurveTo(sx + GRID_SIZE - padding, sy + GRID_SIZE - padding, sx + GRID_SIZE - radius - padding, sy + GRID_SIZE - padding);
                    ctx.lineTo(sx + radius + padding, sy + GRID_SIZE - padding);
                    ctx.quadraticCurveTo(sx + padding, sy + GRID_SIZE - padding, sx + padding, sy + GRID_SIZE - radius - padding);
                    ctx.lineTo(sx + padding, sy + radius + padding);
                    ctx.quadraticCurveTo(sx + padding, sy + padding, sx + radius + padding, sy + padding);
                    ctx.closePath();
                    ctx.fill();

                    // 头部眼睛
                    if (i === 0) {
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#ffffff';
                        const eyeRadius = 3.5;
                        let eyeX1, eyeY1, eyeX2, eyeY2;
                        const centerX = sx + GRID_SIZE / 2;
                        const centerY = sy + GRID_SIZE / 2;
                        // 根据方向调整眼睛位置
                        if (direction.x === 1) { // 向右
                            eyeX1 = centerX + 3; eyeY1 = centerY - 4;
                            eyeX2 = centerX + 3; eyeY2 = centerY + 4;
                        } else if (direction.x === -1) { // 向左
                            eyeX1 = centerX - 3; eyeY1 = centerY - 4;
                            eyeX2 = centerX - 3; eyeY2 = centerY + 4;
                        } else if (direction.y === -1) { // 向上
                            eyeX1 = centerX - 4; eyeY1 = centerY - 3;
                            eyeX2 = centerX + 4; eyeY2 = centerY - 3;
                        } else { // 向下
                            eyeX1 = centerX - 4; eyeY1 = centerY + 3;
                            eyeX2 = centerX + 4; eyeY2 = centerY + 3;
                        }
                        ctx.beginPath();
                        ctx.arc(eyeX1, eyeY1, eyeRadius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(eyeX2, eyeY2, eyeRadius, 0, Math.PI * 2);
                        ctx.fill();
                        // 瞳孔
                        ctx.fillStyle = '#121212';
                        ctx.beginPath();
                        ctx.arc(eyeX1, eyeY1, 1.8, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(eyeX2, eyeY2, 1.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                // 重置阴影
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // 如果游戏暂停，显示提示
                if (gamePaused && !gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 24px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⏸️ 暂停中', canvas.width / 2, canvas.height / 2);
                    ctx.textAlign = 'start';
                }

                // 如果游戏未开始且非结束状态，显示开始提示
                if (!gameRunning && !gameOver && snake.length === INIT_SNAKE.length && score === 0) {
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 22px "PingFang SC", "Microsoft YaHei", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('按 "开始游戏" 或 空格键', canvas.width / 2, canvas.height / 2);
                    ctx.textAlign = 'start';
                }
            }

            // ===========================
            //  游戏循环
            // ===========================
            function gameLoop(timestamp) {
                if (!gameRunning || gameOver) {
                    // 如果游戏结束或停止，继续渲染但不更新逻辑
                    draw();
                    gameLoopId = requestAnimationFrame(gameLoop);
                    return;
                }

                if (!gamePaused) {
                    // 计算时间差，控制速度
                    if (!lastUpdateTime) lastUpdateTime = timestamp;
                    const delta = timestamp - lastUpdateTime;

                    if (delta >= speed) {
                        updateGame();
                        lastUpdateTime = timestamp;
                        // 更新完成后立即重绘
                        draw();
                    }
                } else {
                    // 暂停时仍然重绘（显示暂停界面）
                    draw();
                }

                gameLoopId = requestAnimationFrame(gameLoop);
            }

            // ===========================
            //  事件监听
            // ===========================
            function handleKeyDown(e) {
                const key = e.key;
                // 防止页面滚动 / 默认行为
                const controlKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Space'];
                if (controlKeys.includes(key)) {
                    e.preventDefault();
                }

                // 方向控制
                if (key === 'ArrowUp' || key === 'w' || key === 'W') {
                    if (direction.y !== 1) { // 不能向下时向上
                        nextDirection = { x: 0, y: -1 };
                    }
                } else if (key === 'ArrowDown' || key === 's' || key === 'S') {
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                } else if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                }

                // 空格键：开始/暂停
                if (key === ' ' || key === 'Space') {
                    if (!gameRunning && !gameOver) {
                        startGame();
                    } else if (gameRunning && !gameOver) {
                        pauseGame();
                    }
                    e.preventDefault();
                }

                // R 键重新开始
                if (key === 'r' || key === 'R') {
                    restartGame();
                    e.preventDefault();
                }
            }

            // 移动端按钮事件
            function setupMobileButtons() {
                btnUp.addEventListener('click', () => {
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    if (!gameRunning && !gameOver) startGame();
                });
                btnDown.addEventListener('click', () => {
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    if (!gameRunning && !gameOver) startGame();
                });
                btnLeft.addEventListener('click', () => {
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    if (!gameRunning && !gameOver) startGame();
                });
                btnRight.addEventListener('click', () => {
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    if (!gameRunning && !gameOver) startGame();
                });
            }

            // 按钮事件
            startBtn.addEventListener('click', startGame);
            pauseBtn.addEventListener('click', pauseGame);
            restartBtn.addEventListener('click', restartGame);
            restartBtnOverlay.addEventListener('click', (e) => {
                e.stopPropagation();
                restartGame();
            });

            // 初始化移动端按钮
            setupMobileButtons();

            // 键盘监听
            document.addEventListener('keydown', handleKeyDown);

            // ===========================
            //  初始渲染 & 启动循环
            // ===========================
            // 初始画面
            draw();
            // 启动循环（即使未开始也渲染静态画面）
            gameLoopId = requestAnimationFrame(gameLoop);

            // 清理循环（非必须，但良好实践）
            window.addEventListener('beforeunload', () => {
                if (gameLoopId) cancelAnimationFrame(gameLoopId);
            });

            // 移动端检测，显示/隐藏方向键（也可通过媒体查询CSS处理）
            // 已用CSS媒体查询处理，无需额外JS

            console.log('🐍 贪吃蛇游戏已就绪！使用方向键或WASD控制，空格键暂停/开始，R键重新开始。');
        })();
    </script>
